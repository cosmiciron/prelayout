<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=https://cosmiciron.github.io/layoutmaster/">
  <link rel="canonical" href="https://cosmiciron.github.io/layoutmaster/">
  <title>Prelayout has moved to Layoutmaster</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      font-family: Arial, Helvetica, sans-serif;
      color: #211914;
      background: #fbfaf7;
    }
    main {
      max-width: 720px;
    }
    h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1.05;
    }
    p {
      margin: 18px 0 0;
      font-size: 18px;
      line-height: 1.55;
    }
    a {
      color: #9c4927;
      font-weight: 800;
    }
    code {
      font-size: 0.95em;
    }
  </style>
</head>
<body>
  <main>
    <h1>Prelayout has moved to Layoutmaster.</h1>
    <p>
      The new package is <code>@layoutmaster/layoutmaster</code>, and the live
      demos are now at
      <a href="https://cosmiciron.github.io/layoutmaster/">cosmiciron.github.io/layoutmaster</a>.
    </p>
    <p>
      If you are not redirected automatically,
      <a href="https://cosmiciron.github.io/layoutmaster/">open Layoutmaster</a>.
    </p>
  </main>
</body>
</html>
