<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prelayout Pour Demo</title>
  <script type="importmap">
    {
      "imports": {
        "../engine/dist/core/index.mjs": "/engine/dist/core/index.mjs"
      }
    }
  </script>
  <style>
    body { margin: 0; font-family: "Times New Roman", Times, serif; background: #faf8f4; color: #181410; }
    main { max-width: 1280px; margin: 0 auto; padding: 16px; display: grid; grid-template-columns: 280px 1fr; gap: 16px; }
    .panel, .display-panel, .status-panel { background: #fff; border: 1px solid #d9d1c7; }
    .shape { background: transparent; border: none; margin-top: 18px; }
    .panel { padding: 16px; }
    .display { display: grid; gap: 16px; align-content: start; }
    .display-panel { padding: 16px; overflow: auto; }
    .shape-card { display: grid; grid-template-columns: auto minmax(260px, 360px); gap: 16px; align-items: start; }
    .shape-header { display: flex; justify-content: space-between; gap: 12px; width: 100%; font-size: 12px; line-height: 1.4; color: #5e5449; }
    .shape { position: relative; overflow: visible; }
    .shape-fill { position: absolute; inset: 0; background: rgba(116, 96, 75, 0.06); pointer-events: none; }
    .shape-content { position: absolute; inset: 0; overflow: visible; }
    .shape-outline { position: absolute; inset: 0; border: none; pointer-events: none; box-sizing: border-box; }
    .shape.square .shape-fill,
    .shape.square .shape-outline { border-radius: 0; clip-path: none; }
    .shape.circle .shape-fill,
    .shape.circle .shape-outline { border-radius: 50%; clip-path: none; }
    .shape.oval .shape-fill,
    .shape.oval .shape-outline { border-radius: 50%; clip-path: none; }
    .shape.polygon .shape-fill,
    .shape.polygon .shape-outline { border-radius: 0; }
    .piece { position: absolute; overflow: visible; user-select: text; }
    .piece-text { display: inline-block; white-space: pre; overflow: visible; }
    .status-panel { padding: 12px; display: grid; gap: 12px; }
    .status-title { margin: 0; font-size: 18px; }
    .status-summary { font-size: 13px; color: #5e5449; line-height: 1.4; }
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .status-stat { padding: 10px 12px; border: 1px solid #e0d8cf; background: #fcfaf7; }
    .status-stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: #7a6e61; }
    .status-stat-value { margin-top: 4px; font-size: 18px; line-height: 1.2; }
    .status-block { display: grid; gap: 6px; }
    .status-block-label { font-size: 12px; font-weight: 700; color: #5e5449; }
    .status-block-value { min-height: 96px; padding: 10px 12px; border: 1px solid #e0d8cf; background: #fcfaf7; white-space: pre-wrap; line-height: 1.45; }
    h1 { margin: 0 0 8px; font-size: 32px; }
    p { margin: 0 0 10px; line-height: 1.4; }
    label { display: block; margin-top: 8px; font-size: 13px; }
    input, textarea, select { width: 100%; font: inherit; border: 1px solid #cfc6bc; }
    input, textarea, select { padding: 8px 10px; margin-top: 4px; background: #fff; box-sizing: border-box; }
    textarea { min-height: 220px; resize: vertical; }
    .note { font-size: 12px; color: #5e5449; margin-top: 8px; }
    .perf-note { margin-top: 10px; font-size: 12px; color: #6a5e52; min-height: 16px; line-height: 1.4; }
    .perf-note.error { color: #a03020; }
    .toggle { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 13px; }
    .toggle input { width: auto; margin: 0; }
    @media (max-width: 980px) {
      main { grid-template-columns: 1fr; }
      .shape-card { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>Pour</h1>
      <p>Pour one passage into a single primitive interior and inspect the returned pieces directly.</p>
      <label>Shape
        <select id="shape-input">
          <option value="circle" selected>Circle</option>
          <option value="oval">Oval</option>
          <option value="square">Square</option>
          <option value="polygon">Polygon</option>
        </select>
      </label>
      <label>Font Family
        <select id="font-family-input">
          <option value="Times New Roman, Times, serif" selected>Times New Roman</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="Garamond, Baskerville, serif">Garamond</option>
          <option value="Palatino Linotype, Book Antiqua, Palatino, serif">Palatino</option>
          <option value="Arial, Helvetica, sans-serif">Arial</option>
          <option value="Verdana, Geneva, sans-serif">Verdana</option>
          <option value="'Trebuchet MS', Helvetica, sans-serif">Trebuchet MS</option>
        </select>
      </label>
      <label>Font Size <input id="font-size-input" type="number" value="18"></label>
      <label>Line Height <input id="line-height-input" type="number" step="0.1" value="1.4"></label>
      <label>Hyphenation
        <select id="hyphenation-input">
          <option value="off" selected>off</option>
          <option value="auto">auto</option>
          <option value="soft">soft</option>
        </select>
      </label>
      <label>Text <textarea id="text-input">Pour flips the polarity. Instead of routing around a spatial field, text occupies the inside of the shape itself. That makes primitive geometry usable as a direct editorial container instead of just an obstacle.</textarea></label>
      <label class="toggle"><input id="show-pieces-input" type="checkbox" checked> Show piece framing</label>
      <label class="toggle"><input id="show-shape-input" type="checkbox" checked> Show shape drawing</label>
      <div class="note">This demo stays intentionally minimal: pick one primitive, make it large, and inspect the returned pieces inside that one interior.</div>
      <div id="perf-status" class="perf-note">Idle.</div>
    </section>
    <section class="display">
      <section class="display-panel">
        <div id="shape-host"></div>
      </section>
    </section>
  </main>
  <script type="module" src="./pour.js"></script>
</body>
</html>
